name: Bug 反馈 / Bug Report
description: 功能运行不正常 / 失效 / 报错 / Something is broken or not working
title: "[Bug] "
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        感谢反馈 PikPak 增强大师的问题。  
        Thanks for reporting an issue with PikPak Enhancement Master.

        提交前请先简单搜索已有 Issues，避免重复反馈。  
        Please search existing Issues before submitting to avoid duplicates.

        请不要在日志或截图中泄露账号、Cookie、Authorization、Session、Token 等隐私信息。  
        Do not expose your account, Cookie, Authorization, Session, Token, or other private information in logs or screenshots.

  - type: input
    id: browser-version
    attributes:
      label: 浏览器型号及版本 / Browser and version
      description: 请填写浏览器名称和版本号。 / Please enter your browser name and version.
      placeholder: 例如 / Example: Edge 124.0.2478.80 / Chrome 124.0.6367.119
    validations:
      required: true

  - type: input
    id: script-version
    attributes:
      label: 脚本版本 / Script version
      description: 请填写 PikPak 增强大师的版本号。 / Please enter the PikPak Enhancement Master version.
      placeholder: 例如 / Example: 2.5.0
    validations:
      required: true

  - type: textarea
    id: problem-detail
    attributes:
      label: 问题详情 / Problem details
      description: 请说明问题发生在哪个页面、哪个功能、如何触发、期望结果和实际结果。 / Please describe where it happened, which feature was used, how to reproduce it, the expected result, and the actual result.
      placeholder: |
        1. 打开页面 / Page:
        2. 使用功能 / Feature:
        3. 操作步骤 / Steps:
        4. 期望结果 / Expected result:
        5. 实际结果 / Actual result:
    validations:
      required: true

  - type: textarea
    id: console-error
    attributes:
      label: 控制台报错信息 / Console error
      description: |
        请按 F12 或 Ctrl+Shift+I 打开开发者工具，复制 Console / 控制台中的报错信息。
        如果没有报错，请填写“无”。

        Press F12 or Ctrl+Shift+I to open Developer Tools, then copy errors from Console.
        If there is no error, write "None".
      render: shell
      placeholder: 请粘贴控制台报错信息 / Paste console errors here
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 截图或录屏 / Screenshots or screen recording
      description: 可以直接粘贴截图、拖入图片，或补充录屏链接。 / You can paste screenshots, drag images here, or provide a screen recording link.
      placeholder: 可在此粘贴图片或补充说明 / Paste images or add extra notes here
    validations:
      required: false
