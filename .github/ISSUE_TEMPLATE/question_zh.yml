name: "❓ 问题 / 支持"
description: "提问或寻求使用帮助。"
title: "[Question] "
labels: ["question"]

body:
  - type: markdown
    attributes:
      value: |
        感谢使用 PikPak 增强大师。

        提交前请先搜索已有 Issues 和 Discussions，避免重复提问。
        请不要泄露账号、Cookie、Authorization、Session、Token 等隐私信息。

  - type: textarea
    id: question-detail
    attributes:
      label: "问题 / 支持请求"
      description: "请描述你的问题、已经尝试过的操作，以及希望得到的结果。"
      placeholder: |
        1. 你想了解什么？
        2. 和哪个页面或功能有关？
        3. 你已经尝试了什么？
        4. 你期望得到什么结果？
    validations:
      required: true

  - type: input
    id: browser-version
    attributes:
      label: "浏览器型号及版本"
      description: "请填写浏览器名称和版本号。"
      placeholder: "例如：Edge 124.0.2478.80 / Chrome 124.0.6367.119"
    validations:
      required: false

  - type: input
    id: script-version
    attributes:
      label: "脚本版本"
      description: "请填写 PikPak 增强大师的版本号。"
      placeholder: "例如：2.5.0"
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: "截图或补充信息"
      description: "可以直接粘贴截图、拖入图片，或补充其他说明。"
      placeholder: "可在此粘贴图片或补充说明"
    validations:
      required: false
