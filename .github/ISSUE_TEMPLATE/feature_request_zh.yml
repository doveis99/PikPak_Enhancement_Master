name: "✨ 功能需求"
description: "提出新功能或改进建议。"
title: "[Feature] "
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        感谢为 PikPak 增强大师提出改进建议。

        提交前请先搜索已有 Issues 和 Discussions，避免重复提出相同需求。

  - type: textarea
    id: feature-detail
    attributes:
      label: "功能描述"
      description: "请描述你希望新增或改进的功能。"
      placeholder: |
        1. 你希望增加什么功能？
        2. 这个功能解决什么问题？
        3. 你期望它如何工作？
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: "使用场景"
      description: "请描述你在什么情况下需要这个功能。"
      placeholder: "例如：当我批量管理大量文件时，希望可以……"
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: "替代方案"
      description: "如果你已经尝试过其他方法，或有其他实现思路，可以写在这里。"
      placeholder: "可选"
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: "截图或参考资料"
      description: "可以直接粘贴截图、拖入图片，或补充参考链接。"
      placeholder: "可在此粘贴图片或补充参考链接"
    validations:
      required: false
